name: Deploy via SSM

# Solo mode release strategy:
# - main -> production only
# - no staging promotion path enabled
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/SHA)"
        required: false
        default: "main"

concurrency:
  group: production-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 via SSM (no SSH)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release strategy guardrails
        run: bash scripts/check-release-strategy.sh

      - name: Resolve ref
        id: ref
        run: |
          REF="${{ github.event.inputs.ref || 'main' }}"
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send SSM deploy command
        id: send_ssm
        env:
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
          GIT_REF: ${{ steps.ref.outputs.ref }}
        run: bash scripts/deploy-via-ssm.sh

      - name: Deployment summary
        if: always()
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          DEPLOYED_REF="${{ steps.ref.outputs.ref }}"
          SSM_COMMAND_ID="${{ steps.send_ssm.outputs.command_id }}"
          SSM_STATUS="${{ steps.send_ssm.outputs.ssm_status }}"
          [ -z "$SSM_COMMAND_ID" ] && SSM_COMMAND_ID="n/a"
          [ -z "$SSM_STATUS" ] && SSM_STATUS="n/a"

          echo "Deploy summary:"
          echo "commit_sha=$COMMIT_SHA"
          echo "deployed_ref=$DEPLOYED_REF"
          echo "ssm_command_id=$SSM_COMMAND_ID"
          echo "ssm_status=$SSM_STATUS"
          echo "health_gate=backend+public required"

          {
            echo "### Production Deploy Summary"
            echo "- Commit SHA: \`$COMMIT_SHA\`"
            echo "- Deployed ref: \`$DEPLOYED_REF\`"
            echo "- SSM command id: \`$SSM_COMMAND_ID\`"
            echo "- SSM status: \`$SSM_STATUS\`"
            echo "- Health gate: \`backend + public health required\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on deploy failure
        if: ${{ failure() }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOYED_REF: ${{ steps.ref.outputs.ref }}
          SSM_COMMAND_ID: ${{ steps.send_ssm.outputs.command_id }}
          SSM_STATUS: ${{ steps.send_ssm.outputs.ssm_status }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not configured; skipping Slack deploy-failure notification."
            exit 0
          fi
          git fetch --all --prune
          REF="${GIT_REF}"
          git checkout "$REF"
          git pull --ff-only origin "$REF" || true

          # 5) Export env
          set -a; source .env.production; set +a

          # 6) Build and run
          docker compose -f docker-compose.prod.yml up -d --build

          # 7) Health check backend (required)
          backend_ok=0
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8000/health && backend_ok=1 && break || sleep 2
          done
          if [ "$backend_ok" != "1" ]; then
            echo 'Backend failed health check' >&2
            docker compose -f docker-compose.prod.yml logs --tail=200 backend || true
            exit 1
          fi

          # 8) Configure Nginx single-door proxy
          SITE=$(grep -RIl "server_name[[:space:]]\+practica.jpagan.com" /etc/nginx/sites-enabled /etc/nginx/sites-available 2>/dev/null | head -n1 || true)
          if [ -z "$SITE" ]; then SITE=/etc/nginx/sites-available/practica; fi
          CERT_LINE=$(grep -E "^\s*ssl_certificate\s" "$SITE" | head -n1 || true)
          KEY_LINE=$(grep -E "^\s*ssl_certificate_key\s" "$SITE" | head -n1 || true)
          cp -a "$SITE" "$SITE.bak" 2>/dev/null || true
          cat > "$SITE" <<NGINXCONF
server {
    listen 443 ssl http2;
    server_name practica.jpagan.com;
    ${CERT_LINE}
    ${KEY_LINE}
    client_max_body_size 2G;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
server {
    listen 80;
    server_name practica.jpagan.com;
    return 301 https://$host$request_uri;
}
NGINXCONF
          if [ ! -e /etc/nginx/sites-enabled/practica ]; then ln -sf "$SITE" /etc/nginx/sites-enabled/practica; fi
          nginx -t
          systemctl reload nginx

          # 9) Public health check (required)
          public_ok=0
          for i in $(seq 1 30); do
            curl -fsS https://practica.jpagan.com/health && public_ok=1 && break || sleep 2
          done
          if [ "$public_ok" != "1" ]; then
            echo 'Public health check failed' >&2
            exit 1
          fi

          DEPLOYED_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          echo "DEPLOY_SUMMARY ref=$REF sha=$DEPLOYED_SHA backend_health=pass public_health=pass"
          "
EOS
          )

          # Send SSM command
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Practica deploy via SSM" \
            --parameters commands="[$(printf %q "$COMMANDS")]" \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId: $CMD_ID"

          # Wait for SSM to finish
          FINAL_STATUS="PENDING"
          for i in $(seq 1 120); do
            STATUS=$(aws ssm list-command-invocations --command-id "$CMD_ID" --details --query 'CommandInvocations[0].Status' --output text 2>/dev/null || echo "PENDING")
            echo "SSM status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              FINAL_STATUS="$STATUS"
              break
            fi
            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm list-command-invocations --command-id "$CMD_ID" --details --output text || true
              FINAL_STATUS="$STATUS"
              exit 1
            fi
            sleep 3
          done

          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "SSM command timed out" >&2
            exit 1
          fi

          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "ssm_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        if: always()
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          DEPLOYED_REF="${{ steps.ref.outputs.ref }}"
          SSM_COMMAND_ID="${{ steps.send_ssm.outputs.command_id }}"
          SSM_STATUS="${{ steps.send_ssm.outputs.ssm_status }}"
          [ -z "$SSM_COMMAND_ID" ] && SSM_COMMAND_ID="n/a"
          [ -z "$SSM_STATUS" ] && SSM_STATUS="n/a"

          echo "Deploy summary:"
          echo "commit_sha=$COMMIT_SHA"
          echo "deployed_ref=$DEPLOYED_REF"
          echo "ssm_command_id=$SSM_COMMAND_ID"
          echo "ssm_status=$SSM_STATUS"
          echo "health_gate=backend+public required"

          {
            echo "### Production Deploy Summary"
            echo "- Commit SHA: \`$COMMIT_SHA\`"
            echo "- Deployed ref: \`$DEPLOYED_REF\`"
            echo "- SSM command id: \`$SSM_COMMAND_ID\`"
            echo "- SSM status: \`$SSM_STATUS\`"
            echo "- Health gate: \`backend + public health required\`"
          } >> "$GITHUB_STEP_SUMMARY"
