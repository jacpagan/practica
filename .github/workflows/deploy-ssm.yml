name: Deploy via SSM

# Solo mode release strategy:
# - main -> production only
# - no staging promotion path enabled
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/SHA)"
        required: false
        default: "main"

concurrency:
  group: production-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 via SSM (no SSH)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release strategy guardrails
        run: bash scripts/check-release-strategy.sh

      - name: Resolve ref
        id: ref
        run: |
          REF="${{ github.event.inputs.ref || 'main' }}"
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send SSM deploy command
        id: send_ssm
        env:
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
          GIT_REF: ${{ steps.ref.outputs.ref }}
        run: bash scripts/deploy-via-ssm.sh

      - name: Deployment summary
        if: always()
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          DEPLOYED_REF="${{ steps.ref.outputs.ref }}"
          SSM_COMMAND_ID="${{ steps.send_ssm.outputs.command_id }}"
          SSM_STATUS="${{ steps.send_ssm.outputs.ssm_status }}"
          [ -z "$SSM_COMMAND_ID" ] && SSM_COMMAND_ID="n/a"
          [ -z "$SSM_STATUS" ] && SSM_STATUS="n/a"

          echo "Deploy summary:"
          echo "commit_sha=$COMMIT_SHA"
          echo "deployed_ref=$DEPLOYED_REF"
          echo "ssm_command_id=$SSM_COMMAND_ID"
          echo "ssm_status=$SSM_STATUS"
          echo "health_gate=backend+public required"

          {
            echo "### Production Deploy Summary"
            echo "- Commit SHA: \`$COMMIT_SHA\`"
            echo "- Deployed ref: \`$DEPLOYED_REF\`"
            echo "- SSM command id: \`$SSM_COMMAND_ID\`"
            echo "- SSM status: \`$SSM_STATUS\`"
            echo "- Health gate: \`backend + public health required\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on deploy failure
        if: ${{ failure() }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOYED_REF: ${{ steps.ref.outputs.ref }}
          SSM_COMMAND_ID: ${{ steps.send_ssm.outputs.command_id }}
          SSM_STATUS: ${{ steps.send_ssm.outputs.ssm_status }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not configured; skipping Slack deploy-failure notification."
            exit 0
          fi
          REF_VALUE="${DEPLOYED_REF:-${GITHUB_REF_NAME:-main}}"
          SSM_CMD_VALUE="${SSM_COMMAND_ID:-n/a}"
          SSM_STATUS_VALUE="${SSM_STATUS:-n/a}"
          MSG=":rotating_light: Practica production deploy failed\nRepo: ${GITHUB_REPOSITORY}\nRef: ${REF_VALUE}\nCommit: ${GITHUB_SHA}\nRun: ${RUN_URL}\nSSM Status: ${SSM_STATUS_VALUE}\nSSM Command ID: ${SSM_CMD_VALUE}"
          ESCAPED_MSG=$(printf '%s' "$MSG" | sed 's/\\/\\\\/g; s/"/\\"/g; s/$/\\n/' | tr -d '\n')
          PAYLOAD="{\"text\":\"${ESCAPED_MSG}\"}"
          curl -fsS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
