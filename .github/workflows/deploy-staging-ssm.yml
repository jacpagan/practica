name: Deploy to Staging via SSM

on:
  push:
    branches:
      - integrate/**
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/SHA)"
        required: false
        default: "integrate/app-into-main"

jobs:
  deploy:
    name: Deploy to Staging EC2 via SSM
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.ref }}" ]; then
            REF="${{ github.event.inputs.ref }}"
          else
            REF="${{ github.ref_name }}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send staging SSM deploy command
        env:
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          ENV_STAGING: ${{ secrets.ENV_STAGING }}
          STAGING_HOST_HEADER: ${{ secrets.STAGING_HOST_HEADER }}
          STAGING_PUBLIC_HEALTH_URL: ${{ secrets.STAGING_PUBLIC_HEALTH_URL }}
          STAGING_PROJECT_DIR: ${{ secrets.STAGING_PROJECT_DIR }}
          GIT_REF: ${{ steps.ref.outputs.ref }}
        run: bash scripts/deploy-staging-via-ssm.sh
